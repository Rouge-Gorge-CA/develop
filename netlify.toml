[build]
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions.api]
  timeout = 26

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
